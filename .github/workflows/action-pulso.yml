name: 🚀 Deploy website on push

on: 
  push:
    branches: 
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4 # Versão 2026: mais rápida e estável

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.0 # Versão corrigida e atualizada
      with:
        server: ${{ secrets.ftp_host }}
        username: ${{ secrets.ftp_user }}
        password: ${{ secrets.ftp_password }}
        server-dir: public_html/homolog/pipe-27/wp-content/